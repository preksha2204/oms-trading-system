version: '3.9'

networks:
  oms-net:
    driver: bridge

volumes:
  mysql_data:
  kafka_data:
  zookeeper_data:

services:

  # ─── Infrastructure ──────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    hostname: zookeeper
    container_name: oms-zookeeper
    networks: [oms-net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka
    container_name: oms-kafka
    networks: [oms-net]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 12
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_MESSAGE_MAX_BYTES: 10485760
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: oms-kafka-ui
    networks: [oms-net]
    depends_on: [kafka]
    ports:
      - "9093:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: oms-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  mysql:
    image: mysql:8.0
    container_name: oms-mysql
    networks: [oms-net]
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: oms_root_pass
      MYSQL_DATABASE: oms_db
      MYSQL_USER: oms_user
      MYSQL_PASSWORD: oms_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    command: >
      --innodb-buffer-pool-size=2G
      --innodb-log-file-size=512M
      --innodb-flush-log-at-trx-commit=2
      --max-connections=500
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "oms_user", "-poms_pass"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Microservices ───────────────────────────────────────────────────────────

  reference-data-service:
    build:
      context: ./reference-data-service
      dockerfile: Dockerfile
    container_name: oms-reference-data
    networks: [oms-net]
    ports:
      - "8087:8087"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/oms_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: oms_user
      SPRING_DATASOURCE_PASSWORD: oms_pass
    restart: on-failure

  fix-gateway-service:
    build:
      context: ./fix-gateway-service
      dockerfile: Dockerfile
    container_name: oms-fix-gateway
    networks: [oms-net]
    ports:
      - "9878:9878"
      - "9090:9090"
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/oms_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: oms_user
      SPRING_DATASOURCE_PASSWORD: oms_pass
    volumes:
      - ./fix-store:/app/fix-store
      - ./fix-log:/app/fix-log
    restart: on-failure

  order-management-service:
    build:
      context: ./order-management-service
      dockerfile: Dockerfile
    container_name: oms-order-management
    networks: [oms-net]
    ports:
      - "8081:8081"
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/oms_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: oms_user
      SPRING_DATASOURCE_PASSWORD: oms_pass
    restart: on-failure

  matching-engine-service:
    build:
      context: ./matching-engine-service
      dockerfile: Dockerfile
    container_name: oms-matching-engine
    networks: [oms-net]
    ports:
      - "8082:8082"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    restart: on-failure

  trade-execution-service:
    build:
      context: ./trade-execution-service
      dockerfile: Dockerfile
    container_name: oms-trade-execution
    networks: [oms-net]
    ports:
      - "8083:8083"
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/oms_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: oms_user
      SPRING_DATASOURCE_PASSWORD: oms_pass
    restart: on-failure

  market-data-service:
    build:
      context: ./market-data-service
      dockerfile: Dockerfile
    container_name: oms-market-data
    networks: [oms-net]
    ports:
      - "8084:8084"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    restart: on-failure

  options-pricing-service:
    build:
      context: ./options-pricing-service
      dockerfile: Dockerfile
    container_name: oms-options-pricing
    networks: [oms-net]
    ports:
      - "8086:8086"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    restart: on-failure

  persistence-audit-service:
    build:
      context: ./persistence-audit-service
      dockerfile: Dockerfile
    container_name: oms-persistence-audit
    networks: [oms-net]
    ports:
      - "8088:8088"
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/oms_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: oms_user
      SPRING_DATASOURCE_PASSWORD: oms_pass
    restart: on-failure

  websocket-gateway-service:
    build:
      context: ./websocket-gateway-service
      dockerfile: Dockerfile
    container_name: oms-websocket-gateway
    networks: [oms-net]
    ports:
      - "8085:8085"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    restart: on-failure

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: oms-notification
    networks: [oms-net]
    ports:
      - "8089:8089"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    restart: on-failure

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: oms-api-gateway
    networks: [oms-net]
    ports:
      - "8080:8080"
    depends_on:
      - order-management-service
      - reference-data-service
      - market-data-service
      - matching-engine-service
    restart: on-failure

  oms-ui:
    build:
      context: ./oms-ui
      dockerfile: Dockerfile
    container_name: oms-ui
    networks: [oms-net]
    ports:
      - "4200:80"
    depends_on:
      - api-gateway
      - websocket-gateway-service
    restart: on-failure
